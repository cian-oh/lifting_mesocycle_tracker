<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>HyperTrack</title>
    <meta
      name="description"
      content="HyperTrack by Cian. RP-style hypertrophy tracking without a subscription."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&family=Syncopate:wght@400;700&family=Syne:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080808;
        --bg2: #0f0f0f;
        --surface: #111111;
        --surface2: #181818;
        --border: #1f1f1f;
        --border2: #2a2a2a;
        --accent: #e8001a;
        --accentlo: rgba(232, 0, 26, 0.12);
        --gold: #c9a84c;
        --goldlo: rgba(201, 168, 76, 0.1);
        --text: #efefef;
        --muted: #555555;
        --muted2: #777777;
        --warn: #e87a00;
        --ok: #2dff87;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at top, rgba(232, 0, 26, 0.08), transparent 28%),
          linear-gradient(180deg, #060606 0%, #090909 100%);
        color: var(--text);
        font-family: "Syne", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      input,
      select {
        width: 100%;
        border: 1px solid var(--border2);
        background: var(--bg2);
        color: var(--text);
        border-radius: 12px;
        padding: 12px 10px;
        outline: none;
      }

      .app-shell {
        position: relative;
        max-width: 480px;
        min-height: 100vh;
        margin: 0 auto;
        padding: 18px 14px 120px;
      }

      .app-shell::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.5;
        z-index: 1000;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.55'/></svg>");
        background-size: 220px 220px;
        mix-blend-mode: soft-light;
      }

      .card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 40%), var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 16px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
      }

      .inset {
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: 16px;
      }

      .display {
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 0.03em;
      }

      .label {
        font-family: "Syncopate", sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.24em;
      }

      .mono {
        font-family: "JetBrains Mono", monospace;
      }

      .eyebrow {
        color: var(--gold);
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-family: "JetBrains Mono", monospace;
      }

      .divider {
        height: 1px;
        background: linear-gradient(90deg, var(--accent), transparent);
        margin: 16px 0 18px;
      }

      .btn-primary,
      .btn-ghost,
      .btn-sm,
      .chip,
      .pill-btn {
        border: 0;
        cursor: pointer;
        transition: 160ms ease;
      }

      .btn-primary,
      .btn-sm {
        position: relative;
        overflow: hidden;
        background: linear-gradient(180deg, #ff1431, var(--accent));
        color: white;
        border-radius: 16px;
        font-family: "Syncopate", sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        box-shadow: 0 10px 24px rgba(232, 0, 26, 0.18);
      }

      .btn-primary::after,
      .btn-sm::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.16), transparent 42%);
        pointer-events: none;
      }

      .btn-primary {
        width: 100%;
        padding: 15px 16px;
        font-size: 11px;
      }

      .btn-sm {
        width: auto;
        padding: 11px 14px;
        font-size: 10px;
      }

      .btn-primary:hover,
      .btn-sm:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 30px rgba(232, 0, 26, 0.28);
      }

      .btn-ghost {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border2);
        border-radius: 14px;
        padding: 10px 12px;
        font-size: 10px;
        font-family: "JetBrains Mono", monospace;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .btn-ghost:hover {
        border-color: var(--gold);
        color: white;
      }

      .chip,
      .pill-btn {
        border-radius: 999px;
        padding: 10px 12px;
        background: var(--surface2);
        border: 1px solid var(--border2);
        color: var(--text);
        font-size: 11px;
      }

      .chip.active,
      .pill-btn.active {
        border-color: var(--accent);
        background: var(--accentlo);
      }

      .pill-btn.gold.active {
        border-color: var(--gold);
        background: var(--goldlo);
      }

      .step-dots {
        display: flex;
        gap: 8px;
        margin: 14px 0 18px;
      }

      .step-dot {
        flex: 1;
        height: 4px;
        border-radius: 999px;
        background: var(--border2);
      }

      .step-dot.active {
        background: linear-gradient(90deg, var(--accent), var(--gold));
      }

      .grid-2,
      .grid-3,
      .grid-4 {
        display: grid;
        gap: 10px;
      }

      .grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .muted {
        color: var(--muted2);
      }

      .gold {
        color: var(--gold);
      }

      .accent {
        color: var(--accent);
      }

      .sticky {
        position: sticky;
        top: 10px;
        z-index: 40;
        backdrop-filter: blur(10px);
      }

      .header-card {
        background: rgba(8, 8, 8, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .feature-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .feature-pill {
        padding: 9px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border2);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-family: "JetBrains Mono", monospace;
      }

      .notice {
        background: linear-gradient(135deg, rgba(232, 0, 26, 0.12), rgba(201, 168, 76, 0.06));
        border: 1px solid rgba(232, 0, 26, 0.22);
        border-radius: 18px;
        padding: 14px;
      }

      .title-row,
      .row,
      .space-between {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .tiny {
        font-size: 10px;
      }

      .small {
        font-size: 12px;
      }

      .day-tile {
        position: relative;
        min-height: 124px;
        cursor: pointer;
      }

      .day-tile::before {
        content: "";
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: 14px;
        height: 2px;
        transform: scaleX(0);
        transform-origin: left;
        transition: 160ms ease;
        background: linear-gradient(90deg, var(--accent), transparent);
      }

      .day-tile:hover::before {
        transform: scaleX(1);
      }

      .day-tile.done {
        opacity: 0.38;
        cursor: not-allowed;
      }

      .day-tile.done::before {
        display: none;
      }

      .volume-row {
        display: grid;
        grid-template-columns: 80px 1fr 42px;
        gap: 10px;
        align-items: center;
      }

      .volume-track,
      .progress-track {
        position: relative;
        overflow: hidden;
        height: 10px;
        border-radius: 999px;
        background: #171717;
        border: 1px solid var(--border);
      }

      .volume-fill,
      .progress-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--gold));
      }

      .exercise-block {
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: 18px;
        padding: 12px;
      }

      .exercise-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .exercise-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .badge {
        border-radius: 999px;
        padding: 7px 10px;
        background: var(--goldlo);
        border: 1px solid rgba(201, 168, 76, 0.3);
        color: var(--gold);
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
      }

      .session-grid {
        display: grid;
        grid-template-columns: 28px 1.2fr 1fr 1fr 38px;
        gap: 6px;
        align-items: center;
      }

      .session-grid.header {
        color: var(--muted2);
        margin-bottom: 8px;
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-family: "JetBrains Mono", monospace;
      }

      .done-btn {
        width: 38px;
        height: 42px;
        border-radius: 12px;
        background: var(--bg2);
        color: var(--muted2);
        border: 1px solid var(--border2);
      }

      .done-btn.active {
        color: var(--ok);
        border-color: rgba(45, 255, 135, 0.5);
        background: rgba(45, 255, 135, 0.08);
      }

      .feedback-card {
        margin-top: 10px;
        padding: 14px;
        border-radius: 18px;
        border: 1px solid rgba(201, 168, 76, 0.32);
        background: linear-gradient(180deg, rgba(201, 168, 76, 0.12), rgba(201, 168, 76, 0.05));
        animation: slideDown 0.2s ease;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .feedback-options {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .feedback-btn {
        border-radius: 14px;
        border: 1px solid rgba(201, 168, 76, 0.24);
        background: rgba(0, 0, 0, 0.18);
        padding: 10px;
        color: var(--text);
        text-align: left;
      }

      .feedback-btn.active {
        background: rgba(201, 168, 76, 0.18);
        border-color: var(--gold);
        color: white;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 2000;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: flex-end;
      }

      .sheet {
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        background: #111111;
        border-top: 4px solid var(--accent);
        border-radius: 24px 24px 0 0;
        padding: 18px 14px 26px;
        max-height: 86vh;
        overflow: auto;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        z-index: 2500;
        padding: 12px 16px;
        background: rgba(17, 17, 17, 0.94);
        border: 1px solid var(--border2);
        border-radius: 999px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
      }

      .centered {
        min-height: calc(100vh - 40px);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      @media (max-width: 380px) {
        .session-grid {
          grid-template-columns: 24px 1.1fr 0.9fr 0.9fr 34px;
        }

        .volume-row {
          grid-template-columns: 74px 1fr 38px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="./app.jsx"></script>
  </body>
  </html>
