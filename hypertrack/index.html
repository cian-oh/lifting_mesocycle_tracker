<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>HyperPhases</title>
    <meta
      name="description"
      content="HyperPhases. A mobile-first hypertrophy tracker with customizable splits, RIR-led progression, and feedback-driven volume management."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&family=Syncopate:wght@400;700&family=Syne:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #edf4f6;
        --bg2: #ffffff;
        --surface: rgba(255, 255, 255, 0.95);
        --surface2: rgba(247, 251, 252, 0.98);
        --surface3: rgba(15, 159, 110, 0.06);
        --surface4: rgba(13, 34, 64, 0.04);
        --border: rgba(14, 30, 54, 0.08);
        --border2: rgba(14, 30, 54, 0.14);
        --accent: #18a66f;
        --accentlo: rgba(24, 166, 111, 0.13);
        --gold: #102846;
        --goldlo: rgba(16, 40, 70, 0.07);
        --text: #102846;
        --muted: #61748d;
        --muted2: #73859e;
        --warn: #d97917;
        --ok: #18a66f;
        --ok2: #62cf9b;
        --shadow: 0 24px 50px rgba(15, 23, 42, 0.08);
        --shadow-strong: 0 28px 70px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at top left, rgba(24, 166, 111, 0.14), transparent 24%),
          radial-gradient(circle at top right, rgba(16, 40, 70, 0.08), transparent 22%),
          linear-gradient(180deg, #f8fbfc 0%, #edf4f6 46%, #e8f0f5 100%);
        color: var(--text);
        font-family: "Syne", sans-serif;
        line-height: 1.45;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--border2);
        background: rgba(255, 255, 255, 0.02);
        color: var(--text);
        border-radius: 16px;
        padding: 13px 14px;
        outline: none;
        transition: border-color 160ms ease, background 160ms ease;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgba(199, 164, 88, 0.4);
        background: rgba(255, 255, 255, 0.03);
      }

      textarea {
        resize: vertical;
        min-height: 92px;
      }

      .app-shell {
        position: relative;
        max-width: 500px;
        min-height: 100vh;
        margin: 0 auto;
        padding: 22px 16px 120px;
      }

      .app-shell::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.18;
        z-index: 1000;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.55'/></svg>");
        background-size: 240px 240px;
        mix-blend-mode: soft-light;
      }

      .card {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(252, 255, 255, 0.9)),
          var(--surface);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 19px;
        box-shadow: var(--shadow);
      }

      .inset {
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: 18px;
      }

      .display {
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 0.04em;
      }

      .label {
        font-family: "Syncopate", sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.24em;
      }

      .mono {
        font-family: "JetBrains Mono", monospace;
      }

      .eyebrow {
        color: var(--gold);
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        font-family: "JetBrains Mono", monospace;
      }

      .divider {
        height: 1px;
        background: linear-gradient(90deg, rgba(199, 164, 88, 0.35), transparent);
        margin: 18px 0 22px;
      }

      .btn-primary,
      .btn-ghost,
      .btn-sm,
      .brand-button,
      .chip,
      .pill-btn {
        border: 0;
        cursor: pointer;
        transition: 160ms ease;
      }

      .btn-primary,
      .btn-sm {
        position: relative;
        overflow: hidden;
        background: linear-gradient(180deg, #5dd49b, #18a66f 68%, #128459 100%);
        color: white;
        border-radius: 18px;
        font-family: "Syncopate", sans-serif;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        box-shadow: 0 16px 28px rgba(24, 166, 111, 0.22);
      }

      .btn-primary::after,
      .btn-sm::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.16), transparent 42%);
        pointer-events: none;
      }

      .btn-primary {
        width: 100%;
        padding: 16px 18px;
        font-size: 11px;
      }

      .btn-sm {
        width: auto;
        padding: 12px 16px;
        font-size: 10px;
      }

      .btn-primary:hover,
      .btn-sm:hover {
        transform: translateY(-1px);
        box-shadow: 0 20px 34px rgba(24, 166, 111, 0.26);
      }

      .btn-primary:disabled,
      .btn-sm:disabled,
      .btn-ghost:disabled,
      .chip:disabled,
      .pill-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-ghost {
        background: rgba(255, 255, 255, 0.76);
        color: var(--text);
        border: 1px solid var(--border2);
        border-radius: 16px;
        padding: 11px 14px;
        font-size: 10px;
        font-family: "JetBrains Mono", monospace;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .btn-ghost:hover {
        border-color: rgba(15, 159, 110, 0.24);
        color: var(--text);
        background: rgba(255, 255, 255, 0.96);
      }

      .support-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
      }

      .text-action {
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--accent);
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        cursor: pointer;
      }

      .text-action:disabled {
        opacity: 0.45;
        cursor: default;
      }

      .brand-button {
        padding: 0;
        background: transparent;
        text-align: left;
        color: inherit;
      }

      .brand-button:hover {
        opacity: 0.9;
      }

      .chip,
      .pill-btn {
        border-radius: 999px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid var(--border2);
        color: var(--text);
        font-size: 11px;
      }

      .chip.active,
      .pill-btn.active {
        border-color: var(--accent);
        background: var(--accentlo);
      }

      .pill-btn.gold.active {
        border-color: var(--gold);
        background: var(--goldlo);
      }

      .step-dots {
        display: flex;
        gap: 8px;
        margin: 14px 0 18px;
      }

      .step-dot {
        flex: 1;
        height: 4px;
        border-radius: 999px;
        background: var(--border2);
      }

      .step-dot.active {
        background: linear-gradient(90deg, var(--accent), var(--ok2));
      }

      .grid-2,
      .grid-3,
      .grid-4 {
        display: grid;
        gap: 10px;
      }

      .grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .muted {
        color: var(--muted2);
      }

      .gold {
        color: var(--gold);
      }

      .accent {
        color: var(--accent);
      }

      .sticky {
        position: sticky;
        top: 10px;
        z-index: 40;
        backdrop-filter: blur(14px);
      }

      .header-card {
        background: rgba(255, 255, 255, 0.84);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
      }

      .hero-card {
        position: relative;
        overflow: hidden;
        padding: 28px 22px 22px;
      }

      .hero-panel {
        position: relative;
        overflow: hidden;
        box-shadow: var(--shadow-strong);
      }

      .hero-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.78), transparent 56%),
          linear-gradient(180deg, rgba(98, 207, 155, 0.08), transparent 40%);
        pointer-events: none;
      }

      .hero-orbit {
        position: absolute;
        border-radius: 999px;
        filter: blur(2px);
        pointer-events: none;
      }

      .hero-orbit-a {
        right: -40px;
        top: -42px;
        width: 180px;
        height: 180px;
        background: radial-gradient(circle, rgba(98, 207, 155, 0.24), transparent 68%);
      }

      .hero-orbit-b {
        left: 54%;
        bottom: -76px;
        width: 240px;
        height: 160px;
        background: radial-gradient(circle, rgba(16, 40, 70, 0.1), transparent 72%);
      }

      .hero-title-block,
      .hero-topline,
      .hero-metrics,
      .dashboard-momentum {
        position: relative;
        z-index: 1;
      }

      .hero-subtitle {
        max-width: 360px;
        color: var(--muted);
        font-size: 15px;
      }

      .hero-actions {
        display: flex;
        gap: 10px;
        align-items: center;
        position: relative;
        z-index: 1;
        flex-wrap: wrap;
      }

      .hero-actions .btn-primary {
        flex: 1;
      }

      .hero-metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .metric-pill {
        padding: 14px 12px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(16, 40, 70, 0.08);
        backdrop-filter: blur(8px);
      }

      .support-note {
        padding: 15px 16px;
        border-radius: 22px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(247, 250, 252, 0.9)),
          rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(15, 23, 42, 0.07);
      }

      .support-note .eyebrow {
        color: rgba(15, 159, 110, 0.95);
      }

      .steps-grid {
        display: grid;
        gap: 12px;
      }

      .step-card {
        padding: 17px;
        border-radius: 22px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.92), transparent),
          rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(15, 23, 42, 0.08);
      }

      .step-index {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 999px;
        background: rgba(15, 159, 110, 0.1);
        border: 1px solid rgba(15, 159, 110, 0.18);
        color: var(--accent);
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
      }

      .step-title {
        font-size: 17px;
        font-weight: 700;
      }

      .step-copy {
        font-size: 13px;
        color: var(--muted2);
      }

      .insight-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .insight-card {
        padding: 14px 12px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.74);
        border: 1px solid rgba(15, 23, 42, 0.08);
      }

      .notice {
        background: linear-gradient(135deg, rgba(99, 91, 255, 0.04), rgba(10, 37, 64, 0.02));
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 20px;
        padding: 15px 16px;
      }

      .header-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .action-panel {
        width: 100%;
        border: 1px solid rgba(16, 40, 70, 0.08);
        text-align: left;
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(239, 250, 245, 0.92)),
          var(--surface);
      }

      button.action-panel {
        color: inherit;
      }

      .action-panel:hover {
        transform: translateY(-1px);
        border-color: rgba(24, 166, 111, 0.2);
        box-shadow: 0 20px 38px rgba(15, 23, 42, 0.1);
      }

      .contact-points .mono {
        word-break: break-word;
      }

      .page-section-head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 12px;
        padding: 4px 2px 0;
      }

      .section-divider {
        height: 1px;
        background: linear-gradient(90deg, rgba(16, 40, 70, 0.14), rgba(16, 40, 70, 0.02));
        margin: 6px 2px 2px;
      }

      .hero-topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .status-cluster {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .status-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 11px;
        border-radius: 999px;
        background: rgba(16, 40, 70, 0.05);
        border: 1px solid rgba(16, 40, 70, 0.08);
        color: var(--gold);
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
      }

      .status-chip-good {
        background: rgba(24, 166, 111, 0.1);
        border-color: rgba(24, 166, 111, 0.18);
        color: var(--accent);
      }

      .title-row,
      .row,
      .space-between {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .tiny {
        font-size: 10px;
      }

      .small {
        font-size: 13px;
      }

      .day-tile {
        position: relative;
        min-height: 138px;
        cursor: pointer;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.94), transparent),
          rgba(255, 255, 255, 0.76);
      }

      .day-tile::before {
        content: "";
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: 14px;
        height: 2px;
        transform: scaleX(0);
        transform-origin: left;
        transition: 160ms ease;
        background: linear-gradient(90deg, rgba(15, 159, 110, 0.75), transparent);
      }

      .day-tile:hover::before {
        transform: scaleX(1);
      }

      .day-tile.done {
        opacity: 0.38;
        cursor: not-allowed;
      }

      .day-tile.done::before {
        display: none;
      }

      .volume-row {
        display: grid;
        grid-template-columns: 80px 1fr 42px;
        gap: 10px;
        align-items: center;
      }

      .week-hero {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 16px;
        align-items: end;
      }

      .dashboard-hero {
        gap: 16px;
      }

      .week-copy {
        max-width: 300px;
        color: var(--muted2);
        font-size: 14px;
      }

      .dashboard-momentum {
        display: grid;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        gap: 8px;
        max-width: 260px;
      }

      .momentum-node {
        height: 9px;
        border-radius: 999px;
        background: rgba(16, 40, 70, 0.08);
        border: 1px solid rgba(16, 40, 70, 0.08);
      }

      .momentum-node.done {
        background: linear-gradient(90deg, var(--accent), var(--ok2));
        border-color: transparent;
      }

      .momentum-node.current {
        background: rgba(16, 40, 70, 0.14);
        border-color: rgba(24, 166, 111, 0.22);
      }

      .hero-stat-card,
      .metric-card,
      .section-card {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(247, 251, 252, 0.92)),
          var(--surface);
      }

      .hero-stat-card {
        padding: 14px;
        border-radius: 22px;
        border: 1px solid rgba(16, 40, 70, 0.08);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .metric-card {
        border-radius: 24px;
        box-shadow: 0 18px 34px rgba(15, 23, 42, 0.06);
      }

      .metric-card-focus {
        background:
          linear-gradient(180deg, rgba(242, 255, 249, 0.96), rgba(247, 252, 255, 0.92)),
          var(--surface);
      }

      .section-card {
        border-radius: 26px;
        box-shadow: 0 18px 34px rgba(15, 23, 42, 0.05);
      }

      .volume-track,
      .progress-track {
        position: relative;
        overflow: hidden;
        height: 10px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.06);
        border: 1px solid rgba(15, 23, 42, 0.06);
      }

      .volume-fill,
      .progress-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--ok2));
      }

      .goal-track {
        position: relative;
        overflow: hidden;
        height: 8px;
        border-radius: 999px;
        background: rgba(15, 159, 110, 0.1);
        border: 1px solid rgba(15, 159, 110, 0.08);
      }

      .goal-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--ok2));
      }

      .analytics-card {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(242, 255, 249, 0.9)),
          var(--surface);
      }

      .exercise-block {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 250, 252, 0.95)),
          var(--surface2);
        border: 1px solid rgba(16, 40, 70, 0.08);
        border-radius: 20px;
        padding: 14px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
        position: relative;
        overflow: hidden;
      }

      .exercise-block::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 4px;
        background: linear-gradient(180deg, var(--accent), var(--ok2));
        opacity: 0.9;
      }

      .exercise-block-bodyweight {
        background:
          linear-gradient(180deg, rgba(245, 255, 250, 0.98), rgba(241, 252, 247, 0.95)),
          var(--surface2);
        border-color: rgba(24, 166, 111, 0.16);
      }

      .exercise-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .exercise-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .exercise-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .badge {
        border-radius: 999px;
        padding: 7px 10px;
        background: var(--goldlo);
        border: 1px solid rgba(10, 37, 64, 0.14);
        color: var(--gold);
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
      }

      .session-grid {
        display: grid;
        grid-template-columns: 28px 1.2fr 1fr 1fr 38px;
        gap: 6px;
        align-items: center;
        padding: 6px 0;
        border-radius: 16px;
      }

      .session-grid.active {
        padding: 8px 8px 8px 0;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.78), rgba(240, 248, 252, 0.68));
        border: 1px solid rgba(16, 40, 70, 0.06);
      }

      .session-grid.done {
        padding: 8px 8px 8px 0;
        background: linear-gradient(90deg, rgba(24, 166, 111, 0.1), rgba(24, 166, 111, 0.03));
      }

      .session-grid.header {
        color: var(--muted2);
        margin-bottom: 8px;
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-family: "JetBrains Mono", monospace;
        background: linear-gradient(90deg, rgba(16, 40, 70, 0.04), rgba(24, 166, 111, 0.04));
        padding: 10px 10px 10px 0;
      }

      .done-btn {
        width: 38px;
        height: 42px;
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(242, 247, 250, 0.86));
        color: var(--muted2);
        border: 1px solid var(--border2);
      }

      .done-btn.active {
        color: var(--ok);
        border-color: rgba(15, 159, 110, 0.3);
        background: rgba(15, 159, 110, 0.08);
      }

      .bodyweight-toggle-active {
        border-color: rgba(15, 159, 110, 0.26);
        background: rgba(15, 159, 110, 0.1);
        color: var(--ok);
      }

      .feedback-card {
        margin-top: 10px;
        padding: 15px;
        border-radius: 18px;
        border: 1px solid rgba(15, 159, 110, 0.16);
        background: linear-gradient(180deg, rgba(15, 159, 110, 0.08), rgba(15, 159, 110, 0.03));
        animation: slideDown 0.2s ease;
      }

      .session-overview {
        gap: 10px;
      }

      .add-set-btn {
        align-self: flex-start;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .feedback-options {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .feedback-btn {
        border-radius: 14px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        background: rgba(255, 255, 255, 0.72);
        padding: 10px;
        color: var(--text);
        text-align: left;
      }

      .feedback-btn.active {
        background: rgba(15, 159, 110, 0.09);
        border-color: rgba(15, 159, 110, 0.24);
        color: var(--text);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 2000;
        background: rgba(10, 37, 64, 0.18);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: flex-end;
      }

      .sheet {
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        background: #ffffff;
        border-top: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 28px 28px 0 0;
        padding: 20px 16px 28px;
        max-height: 86vh;
        overflow: auto;
        box-shadow: 0 -24px 60px rgba(15, 23, 42, 0.14);
      }

      .sheet-header {
        margin-bottom: 12px;
      }

      .checkout-shell {
        min-height: 540px;
        border-radius: 22px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(246, 250, 255, 0.96)),
          #ffffff;
        padding: 6px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        z-index: 2500;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--border2);
        border-radius: 999px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.1);
      }

      .centered {
        min-height: calc(100vh - 40px);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      @media (max-width: 380px) {
        .hero-actions,
        .week-hero,
        .insight-grid,
        .hero-metrics {
          grid-template-columns: 1fr;
          display: grid;
        }

        .header-actions {
          justify-content: flex-start;
        }

        .hero-topline,
        .status-cluster {
          justify-content: flex-start;
        }

        .dashboard-momentum {
          max-width: none;
        }

        .session-grid {
          grid-template-columns: 24px 1.1fr 0.9fr 0.9fr 34px;
        }

        .volume-row {
          grid-template-columns: 74px 1fr 38px;
        }
      }
    </style>
  </head>
